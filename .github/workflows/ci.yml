name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Install check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, web, app]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit --skipLibCheck 2>&1 || true
        # || true means TS errors are reported but never block the build
