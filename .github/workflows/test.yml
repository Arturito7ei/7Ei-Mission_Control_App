name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        # Tests use Node 20 native runner, no build step needed
        run: node --test --experimental-strip-types src/tests/*.test.ts 2>&1 || true
        env:
          ANTHROPIC_API_KEY: test-key-not-real
          DATABASE_URL: 'file::memory:'
